<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - StreamVerse</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f; --bg2: #111118; --surface: #1a1a24;
            --accent: #e50914; --accent2: #f5a623; --gold: #FFD700;
            --text: #f0f0f0; --muted: #888;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; overflow-x: hidden; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* NAV - Inherited from index.html */
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 200;
            display: flex; align-items: center; gap: 32px; padding: 16px 48px;
            background: rgba(10,10,15,0.98);
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }
        .logo {
            font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 3px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; flex-shrink: 0; cursor: pointer; text-decoration: none;
        }
        .nav-links { display: flex; gap: 4px; flex: 1; }
        .nav-links a {
            text-decoration: none; color: #bbb; font-size: 0.88rem; font-weight: 500;
            padding: 6px 14px; border-radius: 6px; transition: color 0.2s, background 0.2s;
        }
        .nav-links a:hover { color: #fff; background: rgba(255,255,255,0.07); }
        .nav-right { display: flex; align-items: center; gap: 16px; margin-left: auto; }
        .search-box {
            display: flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px; padding: 7px 16px; transition: border-color 0.2s;
        }
        .search-box input { background: none; border: none; outline: none; color: #fff; font-family: 'Outfit', sans-serif; font-size: 0.85rem; width: 160px; }
        .nav-btn {
            background: linear-gradient(135deg, var(--accent), #c20810); border: none; color: #fff;
            padding: 8px 18px; border-radius: 6px; font-family: 'Outfit', sans-serif;
            font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s, transform 0.2s; text-decoration: none;
        }
        .nav-btn:hover { opacity: 0.88; transform: scale(1.03); }

        /* AUTH CONTAINER */
        .auth-wrapper {
            flex: 1;
            display: flex; align-items: center; justify-content: center;
            padding: 120px 20px 60px;
            position: relative;
        }
        .auth-bg {
            position: absolute; inset: 0;
            background-image: url('https://i.ytimg.com/vi/iQQTA50W-R4/maxresdefault.jpg');
            background-size: cover; background-position: center; opacity: 0.3; z-index: -1;
            filter: blur(8px);
        }
        .auth-container {
            background: rgba(20, 20, 28, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            width: 100%; max-width: 420px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .auth-title {
            font-size: 2rem; font-weight: 700; margin-bottom: 24px; text-align: center;
        }
        .auth-form { display: flex; flex-direction: column; gap: 16px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 0.85rem; color: #bbb; font-weight: 500; }
        .input-group input {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff; font-family: 'Outfit', sans-serif;
            padding: 12px 16px; border-radius: 6px; font-size: 1rem;
            transition: border-color 0.2s, background 0.2s;
        }
        .input-group input:focus { border-color: var(--accent); background: rgba(255,255,255,0.1); outline: none; }
        .auth-submit {
            background: var(--accent); color: #fff;
            border: none; padding: 14px; border-radius: 6px;
            font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 700;
            cursor: pointer; margin-top: 10px; transition: background 0.2s;
        }
        .auth-submit:hover { background: #c20810; }
        .auth-footer { margin-top: 24px; text-align: center; font-size: 0.9rem; color: #bbb; }
        .auth-footer a { color: #fff; text-decoration: none; font-weight: 600; transition: color 0.2s; }
        .auth-footer a:hover { color: var(--accent); }
        .message-container { text-align: center; min-height: 20px; }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="logo">StreamVerse</a>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="movies.html">Movies</a>
        <a href="tv.html">TV Shows</a>
    </div>
    <div class="nav-right">
        <!-- Will be populated by script.js -->
    </div>
</nav>

<div class="auth-wrapper">
    <div class="auth-bg"></div>
    <div class="auth-container">
        <h2 class="auth-title">Create Account</h2>
        <form id="signup-form" class="auth-form">
            <div class="input-group">
                <label for="signup-name">Full Name</label>
                <input type="text" id="signup-name" placeholder="John Doe" required>
            </div>
            <div class="input-group">
                <label for="signup-email">Email Address</label>
                <input type="email" id="signup-email" placeholder="name@example.com" required>
            </div>
            <div class="input-group">
                <label for="signup-password">Password</label>
                <input type="password" id="signup-password" placeholder="At least 6 characters" required>
            </div>
            <div id="signup-message" class="message-container"></div>
            <button type="submit" class="auth-submit">Sign Up</button>
        </form>
        <div class="auth-footer">
            Already have an account? <a href="login.html">Sign in</a>.
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
